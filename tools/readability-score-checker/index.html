    <div class="container">
        <header>

        <div class="tool-section">
            <div class="input-group">
                <label for="textInput">Enter Your Text</label>
                <textarea id="textInput" placeholder="Paste text to analyze readability with multiple metrics..."></textarea>
            </div>

                <button class="primary-btn" id="analyzeBtn">Calculate Scores</button>

                        </div>

                            <div class="summary-value" id="sentenceCount">0</div>
                            <div class="summary-label">Sentences</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-value" id="syllableCount">0</div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', analyzeReadability);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        function countSyllables(word) {
            word = word.toLowerCase();
            let count = 0;
            const vowels = 'aeiouy';
            let previousWasVowel = false;

            for (let i = 0; i < word.length; i++) {
                const isVowel = vowels.includes(word[i]);
                if (isVowel && !previousWasVowel) {
                    count++;
                }
                previousWasVowel = isVowel;
            }

            if (word.endsWith('e')) count--;
            if (word.endsWith('le') && word.length > 2 && !vowels.includes(word[word.length - 3])) {
                count++;
            }

            return Math.max(1, count);
        }

        function analyzeReadability() {
            const text = document.getElementById('textInput').value.trim();

            if (!text) {
                alert('Please enter text to analyze.');
                return;
            }

            const words = text.toLowerCase().match(/\b[a-z]+\b/g) || [];
            const sentences = text.match(/[.!?]+/g) || [];
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);

            if (words.length === 0 || sentences.length === 0) {
                alert('Please enter valid text with sentences.');
                return;
            }

            const wordCount = words.length;
            const sentenceCount = sentences.length;

            let syllableCount = 0;
            words.forEach(word => {
                syllableCount += countSyllables(word);
            });

            // Readability Formulas
            const fk = 0.39 * (wordCount / sentenceCount) + 11.8 * (syllableCount / wordCount) - 15.59;
            const fre = 206.835 - 1.015 * (wordCount / sentenceCount) - 84.6 * (syllableCount / wordCount);
            const gf = 0.4 * ((wordCount / sentenceCount) + 100 * (0.0353 * syllableCount / wordCount));
            const cl = 0.0588 * text.replace(/\s/g, '').length - 0.296 * sentenceCount - 15.8;
            const smog = 1.0430 * Math.sqrt(30 * (syllableCount / sentenceCount)) + 3.1291;
            const ari = (4.71 * (text.replace(/\s/g, '').length / wordCount)) + (0.5 * (wordCount / sentenceCount)) - 21.43;

            const scores = [
                {
                    name: 'Flesch-Kincaid Grade',
                    value: fk.toFixed(1),
                    interpretation: getGradeInterpretation(fk),
                    color: getScoreColor(fk, 0, 5, 10)
                },
                {
                    name: 'Flesch Reading Ease',
                    value: fre.toFixed(1),
                    interpretation: getEaseInterpretation(fre),
                    color: getScoreColor(fre, 90, 60, 30)
                },
                {
                    name: 'Gunning Fog Index',
                    value: gf.toFixed(1),
                    interpretation: getGradeInterpretation(gf),
                    color: getScoreColor(gf, 0, 5, 10)
                },
                {
                    name: 'Coleman-Liau Index',
                    value: cl.toFixed(1),
                    interpretation: getGradeInterpretation(cl),
                    color: getScoreColor(cl, 0, 5, 10)
                },
                {
                    name: 'SMOG Grade',
                    value: smog.toFixed(1),
                    interpretation: getGradeInterpretation(smog),
                    color: getScoreColor(smog, 0, 5, 10)
                },
                {
                    name: 'Automated Readability Index',
                    value: ari.toFixed(1),
                    interpretation: getGradeInterpretation(ari),
                    color: getScoreColor(ari, 0, 5, 10)
                }
            ];

            displayScores(scores);
            displayMetrics(wordCount, sentenceCount, syllableCount);
            displayRecommendation(scores);
        }

        function getGradeInterpretation(grade) {
            if (grade < 6) return 'Elementary School';
            if (grade < 9) return 'Middle School';
            if (grade < 13) return 'High School';
            return 'College/Academic';
        }

        function getEaseInterpretation(ease) {
            if (ease >= 90) return 'Very Easy - 5th grade';
            if (ease >= 80) return 'Easy - 6th grade';
            if (ease >= 70) return 'Fairly Easy - 7th grade';
            if (ease >= 60) return 'Standard - 8th-9th grade';
            if (ease >= 50) return 'Fairly Difficult - 10th-12th grade';
            if (ease >= 30) return 'Difficult - College';
            return 'Very Difficult - College graduate';
        }

        function getScoreColor(score, good, moderate, difficult) {
            if (score <= good || score >= difficult) return 'score-good';
            if (score <= moderate || score >= difficult - 2) return 'score-moderate';
            return 'score-difficult';
        }

        function displayScores(scores) {
            const container = document.getElementById('scoresContainer');
            container.innerHTML = scores.map(score => `
                <div class="score-card">
                    <div class="score-name">${score.name}</div>
                    <div class="score-value ${score.color}">${score.value}</div>
                    <div class="score-interpretation">${score.interpretation}</div>
                </div>
            `).join('');
        }

        function displayMetrics(wordCount, sentenceCount, syllableCount) {
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('sentenceCount').textContent = sentenceCount;
            document.getElementById('syllableCount').textContent = syllableCount;
        }

        function displayRecommendation(scores) {
            const avgGrade = (
                parseFloat(scores[0].value) +
                parseFloat(scores[2].value) +
                parseFloat(scores[3].value) +
                parseFloat(scores[4].value) +
                parseFloat(scores[5].value)
            ) / 5;

            let recommendation = '';
            if (avgGrade < 6) {
                recommendation = '<strong>Great for general audiences!</strong> Your text is easy to understand for most readers. Consider this level for blogs, marketing copy, and public-facing content.';
            } else if (avgGrade < 9) {
                recommendation = '<strong>Good accessibility.</strong> Your text is clear for most educated readers. Suitable for news articles, business writing, and instructional content.';
            } else if (avgGrade < 13) {
                recommendation = '<strong>Moderate complexity.</strong> Your text requires a high school education to understand. Suitable for academic papers, technical documentation, and specialized content.';
            } else {
                recommendation = '<strong>High complexity.</strong> Your text is challenging and requires college-level education. Consider simplifying for broader accessibility, or keep as is for academic/expert audiences.';
            }

            document.getElementById('recommendation').innerHTML = `
                <div class="recommendation-title">Recommendation</div>
                <div class="recommendation-text">${recommendation}</div>
            `;
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
