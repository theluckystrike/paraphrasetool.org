          if (informalSet.has(clean)) outInformal++;
        }
        score = Math.round((1 - (outInformal / Math.max(outWords.length, 1))) * 100);
      }
      if (isNaN(score) || score < 0) score = 0;
      if (score > 100) score = 100;
      updateScore(score);
    }

    function updateScore(score) {
      scoreValue.textContent = score + '%';
      scoreFill.style.width = score + '%';
    }

    // ---------- mode switching ----------
    function setMode(mode) {
      currentMode = mode;
      modeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      convertAndRender();
    }

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setMode(btn.dataset.mode);
      });
    });

    // ---------- copy ----------
    copyBtn.addEventListener('click', async () => {
      const text = outputDisplay.innerText;
      if (!text || text === 'Converted text will appear here') return;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.innerHTML = '<span>✅</span> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = '<span>📋</span> Copy output';
        }, 1800);
      } catch {
        alert('Copy not supported, please select manually.');
      }
    });

    // ---------- input listener ----------
    inputText.addEventListener('input', convertAndRender);

    // ---------- init ----------
    setMode('formal');
  })();
</script>
</body>
</html>
