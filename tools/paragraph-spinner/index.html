<body>

<label for="inputText">Original Text</label>
<textarea id="inputText" placeholder="Paste or type your paragraph here...">The quick brown fox jumps over the lazy dog near the bank of the river. It was a beautiful day and the sun was shining brightly. The fox decided to run across the field and into the woods. Many animals live in the forest and they all enjoy the warm weather.</textarea>

  "very": ["extremely", "highly", "deeply", "immensely", "exceedingly"],
  "quite": ["rather", "fairly", "pretty", "somewhat", "moderately"],
  "too": ["also", "as well", "excessively", "overly", "extremely"],

  "about": ["approximately", "roughly", "around", "nearly", "circa"],
  "above": ["over", "higher than", "beyond", "superior to"],
  "below": ["under", "beneath", "underneath", "lower than"],

  "through": ["via", "by way of", "across", "throughout", "during"],
  "during": ["throughout", "through", "in the course of", "over"],
  "before": ["prior to", "preceding", "earlier than", "ahead of"],
  "after": ["following", "subsequent to", "later than", "behind"],
  "up": ["upward", "above", "higher", "aloft"],
  "down": ["downward", "below", "lower", "beneath"],
  "in": ["inside", "within", "into", "inside of"],
  "out": ["outside", "outward", "outdoors", "without"],
  "on": ["upon", "atop", "on top of", "onto"],
  "off": ["away", "from", "off of", "apart"],
  "at": ["by", "near", "beside", "next to", "adjacent to"],
  "to": ["toward", "in the direction of", "unto", "for"],
  "for": ["on behalf of", "for the sake of", "in order to", "toward"],
  "with": ["alongside", "together with", "accompanied by", "plus"],
  "without": ["lacking", "devoid of", "in the absence of", "minus"],
  "by": ["via", "through", "by means of", "using", "with"],
  "from": ["out of", "away from", "originating from", "starting at"],
  "at": ["by", "near", "beside", "next to", "adjacent to"]

const inputEl = document.getElementById('inputText');
const outputEl = document.getElementById('outputArea');
const statsEl = document.getElementById('stats');
const spinBtn = document.getElementById('spinBtn');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');

function getRandomSynonym(word) {
  const lower = word.toLowerCase();
  const list = synonyms[lower];
  if (!list) return null;
  // pick random, but avoid same word if possible
  let chosen = list[Math.floor(Math.random() * list.length)];
  // preserve case: if original is capitalized, capitalize first letter
  if (word[0] === word[0].toUpperCase() && word.length > 1) {
    chosen = chosen.charAt(0).toUpperCase() + chosen.slice(1);
  } else if (word === word.toUpperCase() && word.length > 1) {
    chosen = chosen.toUpperCase();
  }
  return chosen;
}

function spinText(text) {
  if (!text.trim()) return {result: '', changes: 0, wordCount: 0};
  const words = text.split(/(\s+)/);
  let changes = 0;
  const result = words.map(part => {
    // only process word tokens (non-whitespace)
    if (part.trim().length === 0) return part;
    // extract punctuation
    const match = part.match(/^([a-zA-Z]+)(.*)$/);
    if (!match) return part;
    const word = match[1];
    const punct = match[2];
    const syn = getRandomSynonym(word);
    if (syn && syn.toLowerCase() !== word.toLowerCase()) {
      changes++;
      return syn + punct;
    }
    return part;
  }).join('');
  const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
  return {result, changes, wordCount};
}

function updateOutput() {
  const text = inputEl.value;
  const {result, changes, wordCount} = spinText(text);
  // highlight changes: compare word by word
  const origWords = text.split(/(\s+)/);
  const newWords = result.split(/(\s+)/);
  let highlighted = '';
  let idx = 0;
  for (let i = 0; i < origWords.length && i < newWords.length; i++) {
    if (origWords[i] !== newWords[i] && origWords[i].trim().length > 0 && newWords[i].trim().length > 0) {
      highlighted += '<span class="highlight">' + newWords[i] + '</span>';
    } else {
      highlighted += newWords[i];
    }
  }
  // if lengths differ, append remaining
  if (newWords.length > origWords.length) {
    highlighted += newWords.slice(origWords.length).join('');
  }
  outputEl.innerHTML = highlighted || '&nbsp;';
  statsEl.textContent = `Changes: ${changes}  |  Words: ${wordCount}`;
}

spinBtn.addEventListener('click', updateOutput);

copyBtn.addEventListener('click', function() {
  const text = outputEl.textContent || outputEl.innerText || '';
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const orig = copyBtn.textContent;
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = orig, 1500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    const orig = copyBtn.textContent;
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => copyBtn.textContent = orig, 1500);
  });
});

clearBtn.addEventListener('click', function() {
  inputEl.value = '';
  outputEl.innerHTML = 'Click "Spin Now" to rewrite.';
  statsEl.textContent = 'Changes: 0  |  Words: 0';
});

// auto-spin on load
window.addEventListener('DOMContentLoaded', updateOutput);
})();
</script>
