    <div class="container">
        <header>
            <h1>Tone Adjuster</h1>

        <div class="tool-section">
            <div class="input-group">
                <label for="originalText">Enter Your Text</label>

                <button class="tone-btn" data-tone="professional">Professional</button>
                <button class="tone-btn" data-tone="casual">Casual</button>

                <button class="primary-btn" id="adjustBtn">Adjust Tone</button>
                <button class="secondary-btn" id="clearBtn">Clear</button>

                    <div class="comparison-title">Original Text</div>
                    <div class="comparison-text" id="originalDisplay"></div>
                </div>
                <div class="comparison-box">

                    <div class="comparison-text" id="adjustedDisplay"></div>

    <script>
        const toneReplacements = {
            professional: {
                'hey': 'hello',
                'gonna': 'will',
                'wanna': 'would like to',
                'kinda': 'somewhat',
                'lots of': 'numerous',
                'stuff': 'items',
                'things': 'matters',
                'really': 'quite',
                'very': 'considerably',
                'guy': 'individual',
                'girl': 'woman',
                'cool': 'excellent',
                'awesome': 'outstanding',
                'bad': 'unfavorable',
                'good': 'favorable'
            },
            casual: {
                'hello': 'hey',
                'furthermore': 'plus',
                'accordingly': 'so',
                'excellent': 'great',
                'outstanding': 'awesome',
                'accordingly': 'anyway',
                'however': 'but',
                'moreover': 'also',
                'individual': 'person',
                'utilize': 'use'
            },
            friendly: {
                'the': 'the',
                'hello': 'hey there',
                'goodbye': 'catch you later',
                'unfortunately': 'sadly',
                'excellent': 'wonderful',
                'good': 'great',
                'thank you': 'thanks so much',
                'please': 'pretty please',
                'need': 'need',
                'require': 'need'
            },
            assertive: {
                'might': 'will',
                'could': 'should',
                'perhaps': 'definitely',
                'possibly': 'certainly',
                'seems': 'is',
                'appears': 'is',
                'suggests': 'demonstrates',
                'may': 'must',
                'somewhat': 'significantly'
            },
            empathetic: {
                'you must': 'you might consider',
                'wrong': 'not quite right',
                'bad': 'challenging',
                'failed': 'struggled with',
                'impossible': 'difficult',
                'no': 'i understand, but',
                'obviously': 'as you know',
                'simply': 'understandably'
            }
        };

        let selectedTone = null;

        document.querySelectorAll('.tone-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTone = btn.dataset.tone;
            });
        });

        document.getElementById('adjustBtn').addEventListener('click', adjustTone);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        function adjustTone() {
            const text = document.getElementById('originalText').value.trim();

            if (!text) {
                alert('Please enter some text to adjust.');
                return;
            }

            if (!selectedTone) {
                alert('Please select a tone.');
                return;
            }

            let adjusted = text;
            const replacements = toneReplacements[selectedTone] || {};
            const changes = [];

            // Case-insensitive replacement with tracking
            Object.keys(replacements).forEach(original => {
                const regex = new RegExp('\\b' + original + '\\b', 'gi');
                adjusted = adjusted.replace(regex, (match) => {
                    const replacement = replacements[original];
                    const isCapitalized = match[0] === match[0].toUpperCase();
                    if (isCapitalized && replacement) {
                        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
                    }
                    return replacement;
                });
            });

            // Additional sentence restructuring based on tone
            if (selectedTone === 'professional') {
                adjusted = adjusted.replace(/([.!?])\s+([a-z])/g, '$1 $2');
            } else if (selectedTone === 'casual') {
                adjusted = adjusted.replace(/([.!?])\s+/g, '$1 ');
            }

            document.getElementById('originalDisplay').textContent = text;
            document.getElementById('adjustedDisplay').textContent = adjusted;
            document.getElementById('adjustedTitle').textContent = `${selectedTone.charAt(0).toUpperCase() + selectedTone.slice(1)} Text`;
            document.getElementById('comparison').style.display = 'grid';
        }

        function clearAll() {
            document.getElementById('originalText').value = '';
            document.getElementById('comparison').style.display = 'none';
            document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
            selectedTone = null;
        }
    </script>
