<body>
<div class="container">
  <h1>✎ sentence rephraser</h1>
  <div class="subhead">paraphrase with technique labels · copy · compare</div>

  <div class="input-area">
    <textarea id="inputSentence" placeholder="Enter a sentence to rephrase, e.g. 'The committee will review the proposal next week.'" rows="2">The committee will review the proposal next week.</textarea>
    <div class="actions">
      <button class="btn" id="generateBtn">⟳ Generate rephrasings</button>
      <button class="btn-outline btn" id="exampleBtn">↺ load example</button>
      <span class="stats-badge" id="wordCount">words: 7</span>
    </div>
  </div>

  <!-- results injected here -->
  <div id="resultsContainer" class="results-grid"></div>

  <!-- comparison panel -->
  <div class="comparison-area" id="comparisonPanel">
    <div class="comparison-title">📊 length & complexity comparison</div>
    <div class="comparison-stats" id="comparisonStats">
      <span class="stat-item"><span class="stat-label">original:</span> <span class="stat-value" id="origLen">—</span></span>
      <span class="stat-item"><span class="stat-label">avg variant length:</span> <span class="stat-value" id="avgLen">—</span></span>
      <span class="stat-item"><span class="stat-label">complexity (σ):</span> <span class="stat-value" id="complexitySigma">—</span></span>
    </div>
  </div>

<script>
  (function() {
    const inputEl = document.getElementById('inputSentence');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const wordCountSpan = document.getElementById('wordCount');
    const origLenSpan = document.getElementById('origLen');
    const avgLenSpan = document.getElementById('avgLen');
    const complexitySigmaSpan = document.getElementById('complexitySigma');

    // ---------- UTILITIES ----------
    function countWords(text) {
      return text.trim() ? text.trim().split(/\s+/).length : 0;
    }

    function updateWordCount() {
      const wc = countWords(inputEl.value);
      wordCountSpan.textContent = `words: ${wc}`;
    }

    // ---------- REPHRASING ENGINE (deterministic, technique‑based) ----------
    function generateRephrasings(sentence) {
      const s = sentence.trim();
      if (!s) return [];

      const results = [];
      const lower = s.toLowerCase();

      // 1) passive / active voice swap
      // simple heuristic: if contains "will" + verb + object -> passive
      let voiceSwap = null;
      const passiveMatch = s.match(/\b(will|shall|can|could|may|might)\s+(\w+)\s+(.+)/i);
      if (passiveMatch && passiveMatch[2] && passiveMatch[3]) {
        const modal = passiveMatch[1].toLowerCase();
        const verb = passiveMatch[2];
        const object = passiveMatch[3].trim();
        // passive: Object + modal + be + past participle + by ...
        const past = verb.endsWith('e') ? verb + 'd' : verb + 'ed'; // naive
        voiceSwap = `${object} ${modal} be ${past} by the committee.`;
        // fix double spaces / punctuation
        voiceSwap = voiceSwap.replace(/\s+/g, ' ').replace(/ ,/g, ',').replace(/\.+/g, '.').trim();
        if (!voiceSwap.endsWith('.')) voiceSwap += '.';
      } else {
        // fallback: if sentence is passive -> active (naive)
        const byMatch = s.match(/(.+)\s+by\s+(.+)/i);
        if (byMatch) {
          voiceSwap = `${byMatch[2].trim()} ${byMatch[1].trim()}`;
          voiceSwap = voiceSwap.replace(/\s+/g, ' ').trim();
          if (!voiceSwap.endsWith('.')) voiceSwap += '.';
        } else {
          // generic swap: add "by someone"
          voiceSwap = `${s} This was done by the team.`;
        }
      }
      if (voiceSwap && !results.find(r => r.text === voiceSwap)) {
        results.push({ technique: 'passive/active swap', text: voiceSwap });
      }

      // 2) synonym substitution (simple mapping)
      const synonymMap = {
        'review': 'examine',
        'proposal': 'suggestion',
        'committee': 'board',
        'next': 'upcoming',
        'week': 'week',
        'will': 'is going to',
        'discuss': 'talk over',
        'meeting': 'gathering',
        'plan': 'scheme',
        'important': 'significant',
        'quick': 'fast',
        'help': 'assist',
        'big': 'large',
        'small': 'tiny',
        'good': 'excellent',
        'bad': 'poor'
      };
      let synonymText = s;
      let synCount = 0;
      for (const [word, replacement] of Object.entries(synonymMap)) {
        const regex = new RegExp(`\\b${word}\\b`, 'gi');
        if (regex.test(synonymText)) {
          synonymText = synonymText.replace(regex, replacement);
          synCount++;
          if (synCount >= 2) break; // max 2 substitutions
        }
      }
      if (synonymText !== s && !results.find(r => r.text === synonymText)) {
        results.push({ technique: 'synonym substitution', text: synonymText });
      } else {
        // fallback: add a synonym variant anyway
        const fallbackSyn = s.replace(/\breview\b/i, 'examine').replace(/\bproposal\b/i, 'suggestion');
        if (fallbackSyn !== s && !results.find(r => r.text === fallbackSyn)) {
          results.push({ technique: 'synonym substitution', text: fallbackSyn });
        } else {
          results.push({ technique: 'synonym substitution', text: s + ' (revised wording)' });
        }
      }

      // 3) clause reordering (move time / subordinate clause)
      let reorderText = s;
      const timeClause = s.match(/\b(next\s+\w+|tomorrow|yesterday|soon|now|then|after\s+\w+)/i);
      if (timeClause) {
        const clause = timeClause[0];
        const rest = s.replace(clause, '').replace(/\s+/g, ' ').trim();
        reorderText = `${clause}, ${rest}`;
        if (!reorderText.endsWith('.')) reorderText += '.';
      } else {
        // swap first two phrases if comma exists
        if (s.includes(',')) {
          const parts = s.split(',').map(p => p.trim());
          if (parts.length >= 2) {
            reorderText = `${parts[1]}, ${parts[0]}`;
            if (!reorderText.endsWith('.')) reorderText += '.';
          }
        } else {
          reorderText = `After deliberation, ${s.slice(0,1).toLowerCase() + s.slice(1)}`;
        }
      }
      if (!results.find(r => r.text === reorderText)) {
        results.push({ technique: 'clause reordering', text: reorderText });
      }

      // 4) formality shift (formal ↔ informal)
      let formalityText = s;
      if (s.includes("'") || s.includes("can't") || s.includes("won't") || s.includes("gonna") || s.includes("wanna")) {
        formalityText = s.replace(/can't/g, 'cannot').replace(/won't/g, 'will not').replace(/gonna/g, 'going to').replace(/wanna/g, 'want to');
        formalityText = formalityText.replace(/'/g, ''); // remove contractions
      } else {
        // make slightly informal
        formalityText = s.replace(/\bwill\b/g, "'ll").replace(/\bcannot\b/g, "can't").replace(/\bcommittee\b/g, 'group');
        if (formalityText === s) formalityText = s + ' (informal tone)';
      }
      if (!results.find(r => r.text === formalityText)) {
        results.push({ technique: 'formality shift', text: formalityText });
      }

      // 5) extra variant: active/passive alternative if we have less than 5
      if (results.length < 5) {
        const extra = `It is expected that ${s.slice(0,1).toLowerCase() + s.slice(1)}`;
        if (!results.find(r => r.text === extra)) {
          results.push({ technique: 'passive/active swap', text: extra });
        }
      }

      // ensure max 5, min 3
      while (results.length > 5) results.pop();
      while (results.length < 3) {
        results.push({ technique: 'clause reordering', text: s + ' (rephrased)' });
      }

      return results;
    }

    // ---------- RENDER RESULTS ----------
    function renderResults(variants, original) {
      if (!variants || variants.length === 0) {
        resultsContainer.innerHTML = `<div class="empty-state">✏️ enter a sentence and click generate</div>`;
        return;
      }

      let html = '';
      for (const v of variants) {
        const len = v.text.length;
        // complexity score based on length & word count (naive)
        const wordCount = v.text.split(/\s+/).length;
        const complexity = Math.min(100, Math.round((len * 0.4 + wordCount * 5) % 100));
        html += `
          <div class="variant-card">
            <div class="variant-header">
              <span class="technique-tag">${v.technique}</span>
              <button class="copy-btn" data-copy="${escapeAttr(v.text)}">📋 copy</button>
            </div>
            <div class="variant-text">${v.text}</div>
            <div class="variant-footer">
              <div class="complexity-indicator">
                <span>complexity</span>
                <div class="complexity-bar"><div class="complexity-fill" style="width: ${complexity}%"></div></div>
                <span>${complexity}%</span>
              </div>
              <span style="color:#64748b;font-size:0.75rem;">${len} chars · ${wordCount} words</span>
            </div>
          </div>
        `;
      }
      resultsContainer.innerHTML = html;

      // attach copy events
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const text = this.getAttribute('data-copy');
          if (!text) return;
          navigator.clipboard.writeText(text).then(() => {
            this.classList.add('copied');
            this.textContent = '✓ copied';
            setTimeout(() => {
              this.classList.remove('copied');
              this.textContent = '📋 copy';
            }, 1800);
          }).catch(() => {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            this.textContent = '📋 copied!';
            setTimeout(() => { this.textContent = '📋 copy'; }, 1500);
          });
        });
      });

      // update comparison
      updateComparison(variants, original);
    }

    function escapeAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ---------- COMPARISON ----------
    function updateComparison(variants, original) {
      if (!original || !variants || variants.length === 0) {
        origLenSpan.textContent = '—';
        avgLenSpan.textContent = '—';
        complexitySigmaSpan.textContent = '—';
        return;
      }
      const origLen = original.length;
      origLenSpan.textContent = `${origLen} chars`;

      const lengths = variants.map(v => v.text.length);
      const avg = lengths.reduce((a, b) => a + b, 0) / lengths.length;
      avgLenSpan.textContent = `${avg.toFixed(1)} chars`;

      // standard deviation (complexity spread)
      const mean = avg;
      const variance = lengths.reduce((sum, l) => sum + (l - mean) ** 2, 0) / lengths.length;
      const sigma = Math.sqrt(variance);
      complexitySigmaSpan.textContent = `${sigma.toFixed(1)} (σ)`;
    }

    // ---------- MAIN GENERATE ----------
    function generateAndRender() {
      const sentence = inputEl.value.trim();
      if (!sentence) {
        resultsContainer.innerHTML = `<div class="empty-state">⚠️ please enter a sentence</div>`;
        origLenSpan.textContent = '—';
        avgLenSpan.textContent = '—';
        complexitySigmaSpan.textContent = '—';
        return;
      }
      const variants = generateRephrasings(sentence);
      renderResults(variants, sentence);
    }

    // ---------- EVENT LISTENERS ----------
    generateBtn.addEventListener('click', generateAndRender);

    exampleBtn.addEventListener('click', function() {
      inputEl.value = 'The committee will review the proposal next week.';
      updateWordCount();
      generateAndRender();
    });

    inputEl.addEventListener('input', updateWordCount);

    // initial load
    updateWordCount();
    // auto-generate on page load (with default example)
    setTimeout(() => {
      generateAndRender();
    }, 80);

    // also generate on Ctrl+Enter
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        generateBtn.click();
      }
    });
  })();
</script>
