    <div class="container">
        <header>
            <h1>Sentence Combiner</h1>
            <p class="subtitle">Transform choppy sentences into smooth prose</p>
        </header>

        <div class="tool-section">
            <div class="input-group">
                <label for="sentencesInput">Enter Short Sentences</label>
                <p class="instruction">Enter one sentence per line. The tool will suggest combined versions.</p>
                <textarea id="sentencesInput" placeholder="The sun was bright.&#10;It warmed the earth.&#10;Birds sang in the trees."></textarea>
            </div>

            <div class="button-group">
                <button class="primary-btn" id="combineBtn">Generate Combinations</button>
                <button class="secondary-btn" id="clearBtn">Clear</button>
            </div>

                    <div class="stats-title">Writing Improvement</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="originalCount">0</div>
                            <div class="stat-label">Original Sentences</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="originalWords">0</div>
                            <div class="stat-label">Original Words</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="combinedWords">0</div>
                            <div class="stat-label">Combined Words</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="flowImprovement">0%</div>
                            <div class="stat-label">Flow Score</div>
                        </div>

    <script>
        document.getElementById('combineBtn').addEventListener('click', combineSentences);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        function combineSentences() {
            const input = document.getElementById('sentencesInput').value.trim();

            if (!input) {
                alert('Please enter sentences to combine.');
                return;
            }

            const sentences = input.split('\n')
                .map(s => s.trim())
                .filter(s => s.length > 0 && s.endsWith('.') || s.endsWith('!') || s.endsWith('?'));

            if (sentences.length < 2) {
                alert('Please enter at least 2 sentences.');
                return;
            }

            const original = sentences.join(' ');
            const originalWordCount = original.split(/\s+/).length;

            const strategy1 = generateStrategy1(sentences);
            const strategy2 = generateStrategy2(sentences);
            const strategy3 = generateStrategy3(sentences);

            const strategy1Words = strategy1.split(/\s+/).length;
            const strategy2Words = strategy2.split(/\s+/).length;
            const strategy3Words = strategy3.split(/\s+/).length;

            const strategies = [
                {
                    name: 'Conjunctions',
                    original: sentences.slice(0, 2).join(' '),
                    combined: strategy1,
                    explanation: 'Joins sentences with coordinating conjunctions (and, but, because) to create compound or complex sentences.'
                },
                {
                    name: 'Relative Clauses',
                    original: sentences.slice(0, 2).join(' '),
                    combined: strategy2,
                    explanation: 'Uses relative clauses (who, which, that) to subordinate ideas and create more sophisticated sentence structures.'
                },
                {
                    name: 'Participial Phrases',
                    original: sentences.slice(0, 2).join(' '),
                    combined: strategy3,
                    explanation: 'Converts sentences into participial phrases (-ing or -ed forms) for more concise and elegant writing.'
                }
            ];

            displayStrategies(strategies, sentences.length, originalWordCount);
        }

        function generateStrategy1(sentences) {
            if (sentences.length < 2) return sentences[0];

            const conjunctions = ['and', 'because', 'while', 'although', 'since'];
            const conj = conjunctions[Math.floor(Math.random() * conjunctions.length)];

            let first = sentences[0].replace(/\.$/, '');
            let second = sentences[1];

            return `${first} ${conj.toLowerCase()} ${second.charAt(0).toLowerCase() + second.slice(1)}`;
        }

        function generateStrategy2(sentences) {
            if (sentences.length < 2) return sentences[0];

            let first = sentences[0].replace(/\.$/, '');
            let second = sentences[1].replace(/\.$/, '').toLowerCase();

            if (second.startsWith('the ')) {
                const subject = extractSubject(second);
                if (subject) {
                    return `${first.replace(/\.$/, '')}, which ${subject}, is important.`;
                }
            }

            const subject = extractSubject(first);
            if (subject) {
                return `${first.replace(/\.$/, '')}, ${subject}, ${second}`;
            }

            return `${first.replace(/\.$/, '')} ${second}.`;
        }

        function generateStrategy3(sentences) {
            if (sentences.length < 2) return sentences[0];

            let first = sentences[0].replace(/\.$/, '');
            let second = sentences[1];

            const presentParticiple = convertToParticiple(second);
            return `${first}, ${presentParticiple}.`;
        }

        function extractSubject(sentence) {
            const match = sentence.match(/^(.*?)(is|was|are|were|have|has|do|does)/);
            if (match) {
                return match[1].trim();
            }
            return null;
        }

        function convertToParticiple(sentence) {
            sentence = sentence.replace(/\.$/, '').toLowerCase();

            const verbPatterns = {
                'is ': 'being ',
                'was ': 'having been ',
                'are ': 'being ',
                'became ': 'becoming ',
                'made ': 'making ',
                'took ': 'taking '
            };

            for (const [verb, participle] of Object.entries(verbPatterns)) {
                if (sentence.includes(verb)) {
                    return sentence.replace(verb, participle);
                }
            }

            return sentence;
        }

        function displayStrategies(strategies, sentenceCount, originalWordCount) {
            const container = document.getElementById('strategiesContainer');

            container.innerHTML = strategies.map((strategy, idx) => `
                <div class="strategy-card">
                    <div class="strategy-title">${strategy.name}</div>
                    <div class="strategy-label">Original</div>
                    <div class="original-text">${strategy.original}</div>
                    <div class="strategy-label">Combined Result</div>
                    <div class="combined-text">${strategy.combined}</div>
                    <div class="strategy-explanation">${strategy.explanation}</div>
                </div>
            `).join('');

            const avgCombinedWords = strategies.reduce((sum, s) => sum + s.combined.split(/\s+/).length, 0) / strategies.length;
            const improvement = Math.round((1 - (avgCombinedWords / originalWordCount)) * 100);

            document.getElementById('originalCount').textContent = sentenceCount;
            document.getElementById('originalWords').textContent = originalWordCount;
            document.getElementById('combinedWords').textContent = Math.round(avgCombinedWords);
            document.getElementById('flowImprovement').textContent = Math.max(0, improvement) + '%';

            document.getElementById('results').style.display = 'block';
        }

        function clearAll() {
            document.getElementById('sentencesInput').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
